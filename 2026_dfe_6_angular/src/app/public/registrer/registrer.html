<div class="register-container">

    <!-- LEFT PANEL -->

    <div class="left-panel">

        <div class="overlay"></div>

        <div class="content">

            <a href="#" class="back-home">
                <i class="fa-solid fa-arrow-left"></i>
                Retour à l'accueil
            </a>

            <h1>AngularApp</h1>

            <h2>
                Créez votre compte !
            </h2>

            <p>
                Rejoignez-nous et profitez d’une expérience moderne,
                rapide et sécurisée dès aujourd’hui.
            </p>

        </div>

    </div>

    <!-- RIGHT PANEL -->

    <div class="right-panel">

        <div class="form-container">

            <h2 class="title">Inscription</h2>

            <p class="subtitle">Remplissez vos informations</p>

            <form>

                <!-- PRENOM + NOM -->

                <div class="row">

                    <div class="input-group">
                        <label>Prénom</label>
                        <div class="input-box">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" placeholder="Prénom">
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Nom</label>
                        <div class="input-box">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" placeholder="Nom">
                        </div>
                    </div>

                </div>

                <!-- EMAIL -->

                <div class="input-group">
                    <label>Email</label>
                    <div class="input-box">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" placeholder="Email">
                    </div>
                </div>

                <!-- PHONE -->

                <div class="input-group">
                    <label>Téléphone</label>
                    <div class="input-box">
                        <i class="fa-solid fa-phone"></i>
                        <input type="tel" placeholder="Numéro">
                    </div>
                </div>

                <!-- PASSWORD -->

                <div class="row">

                    <div class="input-group">
                        <label>Mot de passe</label>
                        <div class="input-box">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" placeholder="Mot de passe">
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Confirmation</label>
                        <div class="input-box">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" placeholder="Confirmer">
                        </div>
                    </div>

                </div>

                <!-- BUTTON -->

                <button class="btn">S'inscrire</button>

            </form>

            <div class="bottom-text">
                Déjà un compte ?
                <a href="#">Se connecter</a>
            </div>

        </div>

    </div>

</div>
