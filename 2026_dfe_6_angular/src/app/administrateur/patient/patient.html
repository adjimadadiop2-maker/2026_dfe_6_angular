<div class="card">
  <div class="card-header">
    <div class="row">
      <div class="col-5">
        <div If="title == 'Patients'; else 'notFound'">
          <h5>{{ title }}</h5>
        </div>
        <ng-template #notFound>
          <h3>Titre introuvable</h3>
        </ng-template>
      </div>
      <div class="col-3">
        <input class="form-control me-2" type="search" [placeholder]="getEmail()" aria-label="Search"/>
      </div>
      <div class="col-4">
        <!-- On utilise la methode event-buiding elle est materialisée par les parentheses -->
        <button class="btn btn-outline-success" (click)="getInfoPatient()">Ajouter un patient</button> 
      </div>
    </div>
  </div>
  <div class="card-body">
    <table class="table table-striped">
      <thead>
        <tr>
          <th scope="col">#</th>
          <th scope="col">Prenom</th>
          <th scope="col">Nom</th>
          <th scope="col">Email</th>
          <th>Age</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (item of Patients2 | async ; track $index) {
          <tr>
            <th scope="row">{{ $index + 1 }}</th>
            <td>{{ item.prenom }}</td>
            <td>{{ item.nom }}</td>
            <td>{{ item.mail }}</td>
            <td>{{ item.age }}</td>
            <td>
              <button class="btn btn-primary" (click)="editPatient(item)">Modifier</button> |
              <button class="btn btn-danger" (click)="deletePatient(item.id)">Supprimer</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
