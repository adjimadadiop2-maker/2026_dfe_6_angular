<div class="container mt-4">
  <h3 class="mb-4">Formulaire Medecin</h3>

  <form [formGroup]="formMedecin" (ngSubmit)="submitForm()">

  <div class="mb-3">
    <label>Nom</label>
    <input type="text" class="form-control" formControlName="nom">
  </div>

  <div class="mb-3">
    <label>Prénom</label>
    <input type="text" class="form-control" formControlName="prenom">
  </div>

  <div class="mb-3">
    <label>Email</label>
    <input type="email" class="form-control" formControlName="email">
  </div>

  <div class="mb-3">
    <label>Téléphone</label>
    <input type="text" class="form-control" formControlName="telephone">
  </div>

  <div class="mb-3">
    <label>Fonction</label>
    <input type="text" class="form-control" formControlName="fonction">
  </div>

  <button type="submit" class="btn btn-primary">
    Enregistrer
  </button>

</form>
</div>
