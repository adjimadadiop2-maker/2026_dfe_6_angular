<form [formGroup] = "formPatient" (ngSubmit)="inputForm()"> 
  <div class="form-container">
    <div class="form-row">
      <div class="form-group">
        <label for="prenom" class="form-label">Prénom</label>
        <input type="text" class="form-control" id="prenom" placeholder="Abdoulaye" formControlName="prenom" require>
      </div>
      <div class="form-group">
        <label for="nom" class="form-label">Nom</label>
        <input type="text" class="form-control" id="nom" placeholder="SAMBA" formControlName="nom">
      </div>
    </div>
    
    <div class="form-group">
      <label for="email" class="form-label">Adresse Email</label>
      <input type="email" class="form-control" id="email" placeholder="exemple@gmail.com" formControlName="mail">
    </div>
    
    <div class="form-group">
      <label for="age" class="form-label">Âge</label>
      <input type="number" class="form-control" id="age" placeholder="Age du patient" formControlName="age">
    </div>
    
    <div class="form-actions">
      <button class="btn btn-primary">Enregistrer</button>
      <a href="administration/patient" class="btn-link">Retour sur la liste des patients</a>
    </div>
  </div>
</form>
